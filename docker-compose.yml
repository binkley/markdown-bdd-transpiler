services:
  demo-app:
    build:
      context: .
      dockerfile: Dockerfile.demo
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://localhost:5173/login']
      interval: 2s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PLAYWRIGHT_VERBOSE=${PLAYWRIGHT_VERBOSE:-}
      - TEST_BASE_URL=http://demo-app:5173
      - TEST_DYNAMIC_PATH=${TEST_DYNAMIC_PATH:-}
      - TEST_DYNAMIC_USER=${TEST_DYNAMIC_USER:-}
      - TRANSPILER_VERBOSE=${TRANSPILER_VERBOSE:-false}
    volumes:
      - ./.generated:/app/.generated
      - ./test-results:/app/test-results
    depends_on:
      demo-app:
        condition: service_healthy

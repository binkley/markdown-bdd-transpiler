name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        # Only needed for static checks; test-e2e.sh handles its own Docker builds
        run: npm ci

      - name: Format Check
        run: npx prettier --check .

      - name: Lint JavaScript and TypeScript
        run: npm run lint:js

      - name: Type Check
        run: npm run type-check

      - name: Lint Shell Scripts
        run: npm run lint:sh

      - name: Run E2E BDD Tests
        # Executes the dockerized Vitest suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEST_DYNAMIC_PATH: '/login'
          TEST_DYNAMIC_USER: 'frontend_wizard'
        run: ./scripts/test-e2e.sh

      - name: Upload Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-screenshots
          path: test-results/
          retention-days: 7
